apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: "{{ .Values.app }}-backup"
spec:
  schedules:
    - 0 0 * * *
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 30
  failedJobsHistoryLimit: 30
  workflowSpec:
    activeDeadlineSeconds: 3600
    podGC:
      strategy: OnWorkflowCompletion
    synchronization:
      mutexes:
        - name: backup
    entrypoint: backup
    onExit: notify
    volumes:
      - name: ssh
        secret:
          secretName: beelink1
          defaultMode: 0600
    templates:
      - name: backup
        retryStrategy:
          limit: "2"
        container:
          image: alpine:3.23
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -cex
          args:
            - |
              apk add --no-cache openssh-client util-linux-misc;
              ssh-keyscan -H 192.168.1.30 >> /root/.ssh/known_hosts;
              ssh mchill@192.168.1.30 -o BatchMode=yes "sudo /home/mchill/backup.sh {{ .Values.app }}";
          env:
            - name: TZ
              value: America/New_York
          volumeMounts:
            - name: ssh
              readOnly: true
              mountPath: /root/.ssh/id_rsa
              subPath: id_rsa
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 128Mi
      - name: notify
        container:
          image: alpine:3.23
          command:
            - sh
            - -c
          args:
            - |
              if [ "{{`{{workflow.status}}`}}" = "Failed" ]; then
                apk add --no-cache curl;
                curl -X POST "$HOMEASSISTANT_WEBHOOK" \
                  -H "Content-Type: application/json" \
                  -d "{\"workflow\": \"{{`{{workflow.name}}`}}\", \"status\": \"{{`{{workflow.status}}`}}\"}";
              fi
          envFrom:
            - secretRef:
                name: backup
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 128Mi
