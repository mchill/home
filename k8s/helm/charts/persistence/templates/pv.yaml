apiVersion: v1
kind: PersistentVolume
metadata:
  name: "{{ .Values.app }}"
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: "{{ .Values.size }}"
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: rbd.csi.ceph.com
    fsType: ext4
    volumeHandle: "{{ .Values.app }}"
    volumeAttributes:
      clusterID: a4ad5514-e58b-48d1-a0b4-8feef8685b43 # ceph fsid
      pool: k8s
      staticVolume: "true"
      imageFeatures: deep-flatten,layering,exclusive-lock,object-map,fast-diff
    nodeStageSecretRef:
      name: ceph-csi-rbd-secret
      namespace: ceph-csi-rbd
