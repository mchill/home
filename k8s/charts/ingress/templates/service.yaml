{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app }}
spec:
  type: ClusterIP
  ports:
    - name: {{ .Values.service.targetPort }}
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: {{ .Values.service.protocol }}
{{- if not .Values.endpoint.ip }}
  selector:
    app: {{ .Values.app }}
{{- end}}
{{- end }}
