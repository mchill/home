namespace: server
resources:
  - deployment.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: bazarr
      ingress:
        routes:
          - match: Host("bazarr.mchill.io")
  - name: persistence
    valuesInline:
      app: bazarr
      size: 128Mi
