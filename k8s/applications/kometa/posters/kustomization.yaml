apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
resources:
  - cron-workflow.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: kometa-posters
    files:
      - config/sync.sh
      - config/config.yaml
      - config/movies.yml
      - config/extras.yml
      - config/tv.yml
