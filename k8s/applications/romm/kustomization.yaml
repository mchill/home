namespace: server
resources:
  - deployment.yaml
  - sealed-secret.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: romm
      routes:
        - match: Host("romm.mchill.io")
        - match: Host("romm.mchill.io") && PathPrefix("/api")
          disableForwardAuth: true
  - name: persistence
    valuesInline:
      app: romm
      size: 512Mi
