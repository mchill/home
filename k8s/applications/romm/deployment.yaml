apiVersion: apps/v1
kind: Deployment
metadata:
  name: romm
spec:
  selector:
    matchLabels:
      app: romm
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: romm
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: romm
          image: rommapp/romm:4.7.0
          ports:
            - name: ingress
              containerPort: 8080
          env:
            - name: TZ
              value: America/New_York
            - name: ROMM_PORT
              value: "8080"
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_NAME
              value: romm
            - name: DB_USER
              value: romm-user
          envFrom:
            - secretRef:
                name: romm
          volumeMounts:
            - name: romm
              mountPath: /romm/config
              subPath: config
            - name: romm
              mountPath: /redis-data
              subPath: redis
            - name: libraries
              mountPath: /romm/library
              subPath: games
            - name: libraries
              mountPath: /romm/assets
              subPath: games/assets
            - name: libraries
              mountPath: /romm/resources
              subPath: games/resources
        - name: db
          image: mariadb:11.8.6
          env:
            - name: MYSQL_DATABASE
              value: romm
            - name: MYSQL_USER
              value: romm-user
          envFrom:
            - secretRef:
                name: romm
          volumeMounts:
            - name: romm
              mountPath: /var/lib/mysql
              subPath: mysql
      volumes:
        - name: romm
          persistentVolumeClaim:
            claimName: romm
        - name: libraries
          persistentVolumeClaim:
            claimName: libraries
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 10m
          memory: 1Gi
