apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
spec:
  selector:
    matchLabels:
      app: mealie
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mealie
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: mealie
          image: hkotel/mealie:v3.13.1
          ports:
            - name: ingress
              containerPort: 9000
          env:
            - name: TZ
              value: America/New_York
            - name: ALLOW_SIGNUP
              value: "false"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: BASE_URL
              value: https://recipes.mchill.io
          volumeMounts:
            - name: mealie
              mountPath: /app/data
      volumes:
        - name: mealie
          persistentVolumeClaim:
            claimName: mealie
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 10m
          memory: 1Gi
