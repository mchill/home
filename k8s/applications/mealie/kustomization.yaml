namespace: server
resources:
  - deployment.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: mealie
      ingress:
        routes:
          - match: Host("recipes.mchill.io")
            disableForwardAuth: true
  - name: persistence
    valuesInline:
      app: mealie
      size: 256Mi
