apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer
spec:
  selector:
    matchLabels:
      app: homer
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: homer
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: homer
          image: b4bz/homer:v26.4.2
          ports:
            - name: ingress
              containerPort: 8080
          env:
            - name: TZ
              value: America/New_York
            - name: UID
              value: "1000"
            - name: GID
              value: "1000"
          volumeMounts:
            - name: homer
              mountPath: /www/assets
            - name: config
              mountPath: /www/assets/config.yml
              subPath: config.yaml
      volumes:
        - name: homer
          persistentVolumeClaim:
            claimName: homer
        - name: config
          configMap:
            name: homer
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 128Mi
