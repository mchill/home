# yaml-language-server: $schema=https://raw.githubusercontent.com/argoproj/argo-cd/master/manifests/crds/application-crd.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homeassistant
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://github.com/mchill/home.git
      targetRevision: HEAD
      path: k8s/sources/homeassistant
    - repoURL: https://github.com/mchill/home.git
      targetRevision: HEAD
      path: k8s/helm/charts/ingress
      helm:
        releaseName: homeassistant
        values: |
          app: homeassistant
          ingress:
            routes:
              - match: Host("home.mchill.io")
                disableForwardAuth: true
          loadBalancer:
            ip: 192.168.1.81
            port: 8123
    - repoURL: https://github.com/mchill/home.git
      targetRevision: HEAD
      path: k8s/helm/charts/persistence
      helm:
        releaseName: homeassistant
        values: |
          app: homeassistant
          size: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: server
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - ServerSideApply=true
