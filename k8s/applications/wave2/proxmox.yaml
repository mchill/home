# yaml-language-server: $schema=https://raw.githubusercontent.com/argoproj/argo-cd/master/manifests/crds/application-crd.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: proxmox
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/mchill/home.git
    targetRevision: HEAD
    path: k8s/helm/charts/ingress
    helm:
      values: |
        app: proxmox
        endpoint:
          ip: 192.168.1.30
          port: 8006
        ingress:
          routes:
            - match: Host("proxmox.mchill.io")
              service:
                scheme: https
  destination:
    server: https://kubernetes.default.svc
    namespace: server
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - ServerSideApply=true
