apiVersion: apps/v1
kind: Deployment
metadata:
  name: photon
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: photon
          image: rtuszik/photon-docker:2.1.1
          ports:
            - name: ingress
              containerPort: 2322
          env:
            - name: TIME_ZONE
              value: America/New_York
            - name: UPDATE_STRATEGY
              value: DISABLED
            - name: INITIAL_DOWNLOAD
              value: "FALSE"
            - name: DOWNLOAD_MAX_RETRIES
              value: "10"
            - name: SKIP_MD5_CHECK
              value: "TRUE"
          volumeMounts:
            - name: applications
              mountPath: /photon/data
              subPath: photon
      volumes:
        - name: applications
          persistentVolumeClaim:
            claimName: applications
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 512Mi
