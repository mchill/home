apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
resources:
  - deployment.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: audiobookshelf
      ingress:
        routes:
          - match: Host("books.mchill.io")
            disableForwardAuth: true
  - name: persistence
    valuesInline:
      app: audiobookshelf
      size: 512Mi
