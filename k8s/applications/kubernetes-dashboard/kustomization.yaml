apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
resources:
  - https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/alternative.yaml
  - cluster-role-binding.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: kubernetes-dashboard
      ingress:
        routes:
          - match: Host("k8s.mchill.io")
      service:
        enabled: false
patches:
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: kubernetes-dashboard
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kubernetes-dashboard
        namespace: kubernetes-dashboard
      spec:
        template:
          spec:
            containers:
              - name: kubernetes-dashboard
                args:
                  - --namespace=server
                  - --enable-insecure-login
                  - --enable-skip-login
                resources:
                  limits:
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 128Mi
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dashboard-metrics-scraper
        namespace: kubernetes-dashboard
      spec:
        template:
          spec:
            containers:
              - name: dashboard-metrics-scraper
                resources:
                  limits:
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 128Mi
