apiVersion: apps/v1
kind: Deployment
metadata:
  name: yamtrack
spec:
  selector:
    matchLabels:
      app: yamtrack
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: yamtrack
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: yamtrack
          image: ghcr.io/fuzzygrim/yamtrack:0.25.2
          ports:
            - name: ingress
              containerPort: 8000
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: REDIS_URL
              value: redis://localhost:6379
            - name: REGISTRATION
              value: "True"
            - name: ADMIN_ENABLED
              value: "True"
            - name: TRACK_TIME
              value: "False"
            - name: TMDB_NSFW
              value: "True"
            - name: IGDB_NSFW
              value: "True"
          envFrom:
            - secretRef:
                name: yamtrack
          volumeMounts:
            - name: yamtrack
              mountPath: /yamtrack/db
              subPath: db
        - name: redis
          image: redis:8.6.3-alpine
          volumeMounts:
            - name: yamtrack
              mountPath: /data
              subPath: redis
      volumes:
        - name: yamtrack
          persistentVolumeClaim:
            claimName: yamtrack
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 10m
          memory: 1Gi
