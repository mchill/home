apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
resources:
  - deployment.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: radarr
      ingress:
        routes:
          - match: Host("radarr.mchill.io")
      loadBalancer:
        ip: 192.168.1.84
        port: 80
  - name: persistence
    valuesInline:
      app: radarr
      size: 2Gi
