apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr-uhd
spec:
  selector:
    matchLabels:
      app: radarr-uhd
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: radarr-uhd
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: radarr
          image: ghcr.io/linuxserver/radarr:6.1.1
          ports:
            - name: ingress
              containerPort: 7878
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: MAX_NAME
              value: "140"
          volumeMounts:
            - name: radarr-uhd
              mountPath: /config
            - name: libraries
              mountPath: /movies-uhd
              subPath: movies/uhd
            - name: applications
              mountPath: /trash
              subPath: trash
            - name: applications
              mountPath: /data
              subPath: qbittorrent
      volumes:
        - name: radarr-uhd
          persistentVolumeClaim:
            claimName: radarr-uhd
        - name: applications
          persistentVolumeClaim:
            claimName: applications
        - name: libraries
          persistentVolumeClaim:
            claimName: libraries
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 10m
          memory: 512Mi
