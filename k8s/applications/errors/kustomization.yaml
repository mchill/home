apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
resources:
  - daemon-set.yaml
configMapGenerator:
  - name: errors
    files:
      - index.html
      - 401.html
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: errors
      ingress:
        routes:
          - match: HostRegexp(`{host:.+}`)
            disableForwardAuth: true
            priority: 1
