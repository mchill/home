apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
resources:
  - deployment.yaml
  - sealed-secret.yaml
  - service.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: stardew
      ingress:
        routes:
          - match: Host("stardew.mchill.io")
            disableForwardAuth: true
  - name: persistence
    valuesInline:
      app: stardew
      size: 128Mi
