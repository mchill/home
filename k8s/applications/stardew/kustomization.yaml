namespace: server
resources:
  - deployment.yaml
  - sealed-secret.yaml
  - service.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: stardew
      routes:
        - match: Host("stardew.mchill.io")
          disableForwardAuth: true
  - name: persistence
    valuesInline:
      app: stardew
      size: 128Mi
