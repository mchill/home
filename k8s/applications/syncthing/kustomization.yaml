apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
resources:
  - deployment.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: syncthing
      ingress:
        routes:
          - match: Host("syncthing.mchill.io")
  - name: persistence
    valuesInline:
      app: syncthing
      size: 256Mi
