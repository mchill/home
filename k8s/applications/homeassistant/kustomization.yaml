apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
resources:
  - deployment.yaml
  - service.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: homeassistant
      ingress:
        routes:
          - match: Host("home.mchill.io")
            disableForwardAuth: true
  - name: persistence
    valuesInline:
      app: homeassistant
      size: 1Gi
