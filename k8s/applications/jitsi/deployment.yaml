apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi
spec:
  selector:
    matchLabels:
      app: jitsi
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jitsi
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: jicofo
          image: jitsi/jicofo:stable-10888
          envFrom:
            - configMapRef:
                name: jitsi
            - secretRef:
                name: jitsi
          volumeMounts:
            - name: jitsi
              mountPath: /config
              subPath: jicofo
        - name: prosody
          image: jitsi/prosody:stable-10888
          envFrom:
            - configMapRef:
                name: jitsi
            - secretRef:
                name: jitsi
          volumeMounts:
            - name: jitsi
              mountPath: /config
              subPath: prosody/config
            - name: jitsi
              mountPath: /prosody-plugins-custom
              subPath: prosody/prosody-plugins-custom
        - name: web
          image: jitsi/web:stable-10888
          ports:
            - name: ingress
              containerPort: 80
          envFrom:
            - configMapRef:
                name: jitsi
          volumeMounts:
            - name: jitsi
              mountPath: /config
              subPath: web
        - name: jvb
          image: jitsi/jvb:stable-10888
          ports:
            - name: jvb
              containerPort: 10000
              protocol: UDP
          envFrom:
            - configMapRef:
                name: jitsi
            - secretRef:
                name: jitsi
          volumeMounts:
            - name: jitsi
              mountPath: /config
              subPath: jvb
      volumes:
        - name: jitsi
          persistentVolumeClaim:
            claimName: jitsi
      resources:
        limits:
          memory: 1Gi
        requests:
          cpu: 10m
          memory: 1Gi
