apiVersion: apps/v1
kind: Deployment
metadata:
  name: tautulli
spec:
  selector:
    matchLabels:
      app: tautulli
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: tautulli
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: tautulli
          image: tautulli/tautulli:v2.17.0
          ports:
            - name: ingress
              containerPort: 8181
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: tautulli
              mountPath: /config
      volumes:
        - name: tautulli
          persistentVolumeClaim:
            claimName: tautulli
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 10m
          memory: 256Mi
