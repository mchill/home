namespace: server
resources:
  - deployment.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: sonarr-uhd
      ingress:
        routes:
          - match: Host("sonarr-uhd.mchill.io")
  - name: persistence
    valuesInline:
      app: sonarr-uhd
      size: 512Mi
