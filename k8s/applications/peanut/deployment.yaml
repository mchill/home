apiVersion: apps/v1
kind: Deployment
metadata:
  name: peanut
spec:
  selector:
    matchLabels:
      app: peanut
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: peanut
    spec:
      containers:
        - name: peanut
          image: brandawg93/peanut:5.22.0
          ports:
            - name: ingress
              containerPort: 8080
          env:
            - name: TZ
              value: America/New_York
          volumeMounts:
            - name: peanut
              mountPath: /config
      volumes:
        - name: peanut
          persistentVolumeClaim:
            claimName: peanut
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 10m
          memory: 256Mi
