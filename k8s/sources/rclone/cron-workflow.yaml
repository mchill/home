apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: rclone
spec:
  schedules:
    - 0 0 * * *
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 30
  failedJobsHistoryLimit: 30
  workflowSpec:
    activeDeadlineSeconds: 3600
    podGC:
      strategy: OnWorkflowCompletion
    podSpecPatch: |
      securityContext:
        fsGroup: 1000
    onExit: notify
    entrypoint: rclone
    templates:
      - name: rclone
        retryStrategy:
          limit: "2"
        container:
          image: rclone/rclone:1.74.3
          args:
            - sync
            - --check-first
            - --fast-list
            - --drive-acknowledge-abuse
            - --no-update-modtime
            - --exclude
            - /#snapshot/**
            - -v
            - "gdrive:"
            - /data
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: RCLONE_CONFIG_GDRIVE_TYPE
              value: drive
            - name: RCLONE_CONFIG_GDRIVE_SCOPE
              value: drive
          envFrom:
            - secretRef:
                name: rclone
          volumeMounts:
            - name: rclone
              mountPath: /config/rclone
            - name: googledrive
              mountPath: /data
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 128Mi
        volumes:
          - name: rclone
            persistentVolumeClaim:
              claimName: rclone
          - name: googledrive
            persistentVolumeClaim:
              claimName: googledrive
      - name: notify
        container:
          image: alpine:3.24
          command:
            - sh
            - -c
          args:
            - |
              if [ "{{workflow.status}}" = "Failed" ]; then
                apk add --no-cache curl;
                curl -X POST "$HOMEASSISTANT_WEBHOOK" \
                  -H "Content-Type: application/json" \
                  -d "{\"workflow\": \"{{workflow.name}}\", \"status\": \"{{workflow.status}}\"}";
              fi
          envFrom:
            - secretRef:
                name: homeassistant-webhook
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 128Mi
