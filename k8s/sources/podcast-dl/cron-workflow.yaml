apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: podcast-dl
spec:
  schedules:
    - 0 * * * *
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 30
  failedJobsHistoryLimit: 30
  workflowSpec:
    activeDeadlineSeconds: 3600
    podGC:
      strategy: OnWorkflowCompletion
    podSpecPatch: |
      securityContext:
        fsGroup: 1000
    onExit: notify
    entrypoint: podcast-dl
    volumes:
      - name: libraries
        persistentVolumeClaim:
          claimName: libraries
    templates:
      - name: podcast-dl
        retryStrategy:
          limit: "2"
        container:
          image: node:22.22.2
          command:
            - /bin/bash
            - -c
          args:
            - |
              apt update
              apt install -y ffmpeg
              npm install -g podcast-dl@9.1.0
              for d in /podcasts/*/; do
                [ -f "${d}rss.txt" ] || continue
                podcast-dl --url $(cat "${d}rss.txt") \
                  --out-dir "$d" --episode-template "{{guid}}" \
                  --include-meta --include-episode-meta --include-episode-images --add-mp3-metadata
              done
          env:
            - name: TZ
              value: America/New_York
            - name: UID
              value: "1000"
            - name: GID
              value: "1000"
          volumeMounts:
            - name: libraries
              mountPath: /podcasts
              subPath: podcasts
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 512Mi
      - name: notify
        container:
          image: alpine:3.23
          command:
            - sh
            - -c
          args:
            - |
              if [ "{{workflow.status}}" = "Failed" ]; then
                apk add --no-cache curl;
                curl -X POST "$HOMEASSISTANT_WEBHOOK" \
                  -H "Content-Type: application/json" \
                  -d "{\"workflow\": \"{{workflow.name}}\", \"status\": \"{{workflow.status}}\"}";
              fi
          envFrom:
            - secretRef:
                name: homeassistant-webhook
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 128Mi
