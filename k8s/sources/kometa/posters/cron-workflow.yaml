apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: kometa-posters
spec:
  schedules:
    - "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 30
  failedJobsHistoryLimit: 30
  workflowSpec:
    activeDeadlineSeconds: 3600
    podGC:
      strategy: OnWorkflowCompletion
    podSpecPatch: |
      securityContext:
        fsGroup: 1000
    onExit: notify
    entrypoint: kometa
    volumes:
      - name: kometa
        persistentVolumeClaim:
          claimName: kometa
      - name: libraries
        persistentVolumeClaim:
          claimName: libraries
      - name: config
        configMap:
          name: kometa-posters
    templates:
      - name: kometa
        retryStrategy:
          limit: "2"
        initContainers:
          - name: render-config
            image: bash:5.3.15
            args:
              - -c
              - |
                apk add --no-cache gettext rsync
                envsubst < /config_src/config.yaml > /config/config.yml
                bash /config/sync.sh
            envFrom:
              - secretRef:
                  name: kometa
            volumeMounts:
              - name: kometa
                mountPath: /config
                subPath: posters
              - name: libraries
                mountPath: /data
              - name: config
                mountPath: /config_src/config.yaml
                subPath: config.yaml
              - name: config
                mountPath: /config/sync.sh
                subPath: sync.sh
        container:
          image: kometateam/kometa:v2.3.1
          args:
            - --run
            - --read-only-config
          env:
            - name: TZ
              value: America/New_York
          volumeMounts:
            - name: kometa
              mountPath: /config
              subPath: posters
            - name: libraries
              mountPath: /data
            - name: config
              mountPath: /config/movies.yml
              subPath: movies.yml
            - name: config
              mountPath: /config/tv.yml
              subPath: tv.yml
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 10m
              memory: 1Gi
      - name: notify
        container:
          image: alpine:3.24
          command:
            - sh
            - -c
          args:
            - |
              if [ "{{workflow.status}}" = "Failed" ]; then
                apk add --no-cache curl;
                curl -X POST "$HOMEASSISTANT_WEBHOOK" \
                  -H "Content-Type: application/json" \
                  -d "{\"workflow\": \"{{workflow.name}}\", \"status\": \"{{workflow.status}}\"}";
              fi
          envFrom:
            - secretRef:
                name: homeassistant-webhook
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 128Mi
