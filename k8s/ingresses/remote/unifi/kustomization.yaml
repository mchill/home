apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
helmGlobals:
  chartHome: ../../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: remote-unifi
      endpoint:
        ip: 192.168.121.1
        port: 443
      ingress:
        routes:
          - match: Host("unifi.remote.mchill.io")
            service:
              scheme: https
