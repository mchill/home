apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
helmGlobals:
  chartHome: ../../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: remote-pihole
      endpoint:
        ip: 192.168.0.201
        port: 8080
      ingress:
        routes:
          - match: Host("pihole.remote.mchill.io")
          - match: Host("pihole.remote.mchill.io") && Path("/")
            middlewares:
              - name: pihole
