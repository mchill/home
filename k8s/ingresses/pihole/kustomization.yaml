namespace: server
resources:
  - endpoint.yaml
  - middleware.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: pihole
      addSelector: false
      routes:
        - match: Host("pihole.mchill.io")
        - match: Host("pihole.mchill.io") && Path("/")
          middlewares:
            - name: pihole
