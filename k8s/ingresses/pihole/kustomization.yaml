apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
resources:
  - middleware.yaml
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: pihole
      endpoint:
        ip: 192.168.1.2
        port: 80
      ingress:
        routes:
          - match: Host("pihole.mchill.io")
          - match: Host("pihole.mchill.io") && Path("/")
            middlewares:
              - name: pihole
