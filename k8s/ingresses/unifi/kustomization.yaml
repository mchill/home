apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
resources:
  - deployment.yaml
configMapGenerator:
  - name: unifi
    files:
      - proxy.js
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: unifi
      endpoint:
        ip: 192.168.1.1
        port: 443
      ingress:
        routes:
          - match: Host("unifi.mchill.io")
            service:
              scheme: https
          # - match: Host("unifi.mchill.io") && Path("/proxy/network/v2/api/site/default/topology")
          #   service:
          #     name: unifi-proxy
          #     scheme: https
          #     port: 3000
  - name: ingress
    valuesInline:
      app: unifi-proxy
      service:
        port: 3000
      ingress:
        enabled: false
