namespace: server
resources:
  - deployment.yaml
  - endpoint.yaml
  - service.yaml
configMapGenerator:
  - name: unifi
    files:
      - proxy.js
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: unifi
      addSelector: false
      routes:
        - match: Host("unifi.mchill.io")
          scheme: https
        - match: Host("unifi.mchill.io") && Path("/proxy/network/v2/api/site/default/topology")
          scheme: https
          service: unifi-proxy
          port: 3000
