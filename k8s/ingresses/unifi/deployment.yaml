apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-proxy
spec:
  selector:
    matchLabels:
      app: unifi-proxy
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: unifi-proxy
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: proxy
          image: node:22.22.1-alpine
          command: [node, /app/proxy.js]
          ports:
            - name: ingress
              containerPort: 3000
          env:
            - name: TZ
              value: America/New_York
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          volumeMounts:
            - name: config
              mountPath: /app/proxy.js
              subPath: proxy.js
      volumes:
        - name: config
          configMap:
            name: unifi
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 128Mi
