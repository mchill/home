namespace: server
transformers:
  - label-transformer.yaml
resources:
  - ../../overlays/ingress
  - endpoint.yaml
patches:
  - target:
      kind: IngressRoute
    patch: |-
      - op: add
        path: /spec/routes/-
        value:
          match: Host("minio-api.mchill.io")
          kind: Rule
          services:
            - name: minio
              port: 9000
  - target:
      kind: Service
    patch: |-
      - op: add
        path: /spec/ports/-
        value:
          name: api
          port: 9000
          targetPort: api
