apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: server
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: ingress
    valuesInline:
      app: kvm
      endpoint:
        ip: 192.168.1.12
        port: 443
      ingress:
        routes:
          - match: Host("kvm.mchill.io")
            service:
              scheme: https
