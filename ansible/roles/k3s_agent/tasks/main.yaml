- name: Check mandatory variables
  ansible.builtin.assert:
    that:
      - k3s_token is defined

- name: Configure k3s agent
  become: true
  block:
    - name: Create k3s directory
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        recurse: true

    - name: Copy config file
      ansible.builtin.template:
        src: config.yaml.j2
        dest: /etc/rancher/k3s/config.yaml
        mode: "0644"

    - name: Install k3s
      environment:
        INSTALL_K3S_CHANNEL: v1.35
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -s - agent
      register: install_k3s
      changed_when: '"No change detected so skipping service start" not in install_k3s.stdout'
