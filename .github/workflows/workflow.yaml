name: Home Server
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint k8s/applications
        working-directory: k8s
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          ./kustomize build --enable-helm --load-restrictor=LoadRestrictionsNone applications > /dev/null
          echo "✓ k8s/applications linting passed"

      - name: Lint k8s/sources
        working-directory: k8s
        run: |
          wget -qO - https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -strict -ignore-missing-schemas \
            -ignore-filename-pattern 'homer/config' \
            -ignore-filename-pattern 'kometa/(permissions|posters)/config' \
            -ignore-filename-pattern 'minecraft/(ops|whitelist)' \
            -ignore-filename-pattern 'ddns/secret' \
            sources/
